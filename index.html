<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#16213e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="樂透分析">
  <title>539・大樂透分析</title>
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }
    .header { background: #16213e; padding: 12px 16px; display: flex; align-items: center; justify-content: center; gap: 12px; min-height: 52px; }
    .header-title { font-size: 1.2rem; }
    .header-mascot-wrap { width: 56px; height: 56px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #0f3460; border: 2px solid rgba(255,255,255,0.2); }
    .header-mascot-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: center center; display: block; }
    .tabs { display: flex; background: #0f3460; }
    .tabs button { flex: 1; padding: 14px; border: none; background: transparent; color: #aaa; font-size: 1rem; cursor: pointer; }
    .tabs button.active { background: #e94560; color: #fff; font-weight: bold; }
    .container { padding: 12px 16px; max-width: 480px; margin: 0 auto; }
    label { display: block; margin: 10px 0 4px; font-size: 0.9rem; color: #bbb; }
    input[type="number"], input[type="text"] { width: 100%; padding: 12px; font-size: 1rem; border: 1px solid #333; border-radius: 8px; background: #16213e; color: #fff; }
    textarea { width: 100%; min-height: 120px; padding: 12px; font-size: 0.95rem; border: 1px solid #333; border-radius: 8px; background: #16213e; color: #fff; resize: vertical; }
    .btn { display: block; width: 100%; padding: 14px; margin: 10px 0; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-secondary { background: #0f3460; color: #fff; }
    .btn-tertiary { background: #23395d; color: #fff; }
    #out { background: #16213e; border: 1px solid #333; border-radius: 8px; padding: 14px; margin-top: 12px; white-space: pre-wrap; word-break: break-all; font-size: 0.9rem; line-height: 1.5; max-height: 50vh; overflow-y: auto; }
    .help { font-size: 0.85rem; color: #888; margin-top: 8px; }
    .how-add { background: #0f3460; padding: 14px; border-radius: 8px; margin-top: 16px; font-size: 0.9rem; }
    .how-add summary { cursor: pointer; }
    #apiBase.api-base-locked { user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; pointer-events: none; background: #0f3460 !important; color: #94a3b8; }
    .lucky-card { background: linear-gradient(135deg, #0f3460 0%, #16213e 100%); border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; border: 1px solid #2a2a4a; }
    .lucky-card .title { font-size: 0.85rem; color: #94a3b8; margin-bottom: 6px; }
    .lucky-card .nums { display: flex; flex-wrap: wrap; gap: 8px; }
    .lucky-card .num { width: 36px; height: 36px; border-radius: 50%; background: #e94560; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1rem; }
    .hotcold-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 8px; }
    .hotcold-table th, .hotcold-table td { padding: 6px 8px; text-align: left; border-bottom: 1px solid #2a2a4a; }
    .hotcold-table th { color: #94a3b8; }
    .hotcold-table .bar-wrap { width: 80px; height: 14px; background: #0f172a; border-radius: 4px; overflow: hidden; }
    .hotcold-table .bar { height: 100%; background: linear-gradient(90deg, #2b6cb0, #e94560); border-radius: 4px; }
    .ad-slot { min-height: 90px; margin: 16px 0; padding: 12px; background: rgba(15,52,96,0.3); border-radius: 8px; border: 1px dashed #2a2a4a; color: #666; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">539</span>
    <div class="header-mascot-wrap">
      <img src="images/landgod.png" alt="" id="landgodImg" onerror="this.parentElement.style.display='none'">
    </div>
    <span class="header-title">大樂透分析</span>
  </div>
  <div class="tabs">
    <button type="button" id="tab539" class="active">今彩539</button>
    <button type="button" id="tab649">大樂透</button>
  </div>
  <div class="container">
    <label>貼上開獎號碼（每行一期，號碼用逗號或空格分隔）</label>
    <textarea id="data" placeholder="今彩539 每行 5 個號碼 (1-39)&#10;例：3,6,9,31,39&#10;5,22,28,35,36"></textarea>
    <p class="help" id="help">今彩539：每行 5 個號碼。大樂透：每行 6 個號碼。</p>
    <p class="help" style="margin-bottom:8px;">全站免費使用 · 若覺得有幫助歡迎 <a href="pay.html" id="linkUpgrade" style="color:#e94560;">隨喜抖內</a></p>
    <div class="lucky-card" id="luckyCard">
      <div class="title">🍀 今日幸運號（僅供娛樂，同一天大家都一樣）</div>
      <div class="nums" id="luckyNums"></div>
    </div>
    <div class="lucky-card" id="landgodCard">
      <div class="title">🙏 虛擬土地公：今日籤詩（僅供娛樂，不保證中獎）</div>
      <div id="landgodFortune" style="font-size:0.9rem;color:#e2e8f0;line-height:1.5;margin-bottom:8px;"></div>
      <button type="button" class="btn btn-tertiary" id="btnLandgodComfort" style="margin-top:4px;">聽土地公安慰一句</button>
      <p class="help" style="margin-top:6px;">※ 籤詩與安慰話語僅為娛樂與心態提醒，請量力而為。</p>
    </div>
    <label>分析期數（取最近幾期）</label>
    <input type="number" id="periods" value="20" min="5" max="200">
    <label id="labelFetch">一鍵抓取（免費可用，直接按）</label>
    <div id="apiBaseWrap">
      <span id="apiBaseFreeMsg" class="help" style="display:none;"></span>
      <input type="text" id="apiBase" placeholder="抓取服務網址（已預填）" value="" autocomplete="off">
    </div>
    <button type="button" class="btn btn-tertiary" id="btnFetch">一鍵抓取最新開獎</button>
    <button type="button" class="btn btn-primary" id="btnAnalyze">分析（統計＋趨勢＋推薦）</button>
    <button type="button" class="btn btn-secondary" id="btnAI">AI 快報</button>
    <button type="button" class="btn btn-secondary" id="btnProStructure">結構分析</button>
    <button type="button" class="btn btn-tertiary" id="btnHotCold">冷熱號一覽表</button>
    <button type="button" class="btn btn-tertiary" id="btnTrend">歷史走勢圖</button>
    <a href="dashboard.html" class="btn btn-secondary" id="linkDashboard" style="text-align:center;text-decoration:none;margin-top:8px;display:block;">📡 全網共識儀表板</a>
    <a href="live.html" class="btn btn-secondary" style="text-align:center;text-decoration:none;margin-top:8px;display:block;">📺 開獎直播</a>
    <a href="chat.html" class="btn btn-secondary" style="text-align:center;text-decoration:none;margin-top:8px;display:block;">💬 討論區</a>
    <!-- 廣告區：可貼上 Google AdSense 或其他廣告代碼 -->
    <div class="ad-slot" id="adIndex"><!-- 在此貼上廣告代碼 --></div>
    <div id="out"></div>
    <details class="how-add">
      <summary>如何「加到主畫面」當 App 使用？</summary>
      <p><strong>iPhone：</strong> Safari 打開此頁 → 分享 → 「加入主畫面」。</p>
      <p><strong>Android：</strong> Chrome 打開此頁 → 選單(⋮) → 「加入主畫面」或「安裝應用程式」。</p>
      <p>之後從主畫面點圖示即可像 App 一樣開啟。</p>
    </details>
  </div>
  <script>
(function() {
  const $ = id => document.getElementById(id);
  const dataEl = $('data');
  const periodsEl = $('periods');
  const apiBaseEl = $('apiBase');
  const outEl = $('out');
  const helpEl = $('help');
  let mode = '539';

  const LS_API_BASE = 'lotto_api_base_v1';
  const LS_LAST_539 = 'lotto_last_539_v1';
  const LS_LAST_649 = 'lotto_last_649_v1';
  const LS_IS_PRO = 'lotto_is_pro_v1';
  const LS_PAID_UNTIL = 'lotto_paid_until_v1';  // 訂月制：付費有效至 YYYYMMDD

  const DEFAULT_API_BASE = 'https://workers-playground-spring-fog-589c.kkalex0987.workers.dev';
  const PAYMENT_URL = 'pay.html';
  const savedBase = localStorage.getItem(LS_API_BASE);

  function getPaidUntil() {
    const until = localStorage.getItem(LS_PAID_UNTIL);
    if (!until || until.length !== 8) return null;
    return until;
  }

  function isPaidExpired() {
    const until = getPaidUntil();
    if (!until) return false;
    const y = parseInt(until.slice(0, 4), 10);
    const m = parseInt(until.slice(4, 6), 10);
    const d = parseInt(until.slice(6, 8), 10);
    const now = new Date();
    const thisYear = now.getFullYear();
    const thisMonth = now.getMonth() + 1;
    const thisDay = now.getDate();
    if (thisYear > y) return true;
    if (thisYear < y) return false;
    if (thisMonth > m) return true;
    if (thisMonth < m) return false;
    return thisDay > d;
  }

  function clearPaidIfExpired() {
    if (isPaidExpired()) {
      localStorage.removeItem(LS_IS_PRO);
      localStorage.removeItem(LS_PAID_UNTIL);
      localStorage.removeItem(LS_API_BASE);
      return true;
    }
    return false;
  }

  // 一鍵抓取網址預填並鎖住，不讓複製／修改
  function applyApiBaseByPro() {
    if (!apiBaseEl) return;
    if (!(apiBaseEl.value || '').trim()) apiBaseEl.value = DEFAULT_API_BASE;
    apiBaseEl.readOnly = true;
    apiBaseEl.classList.add('api-base-locked');
    apiBaseEl.setAttribute('readonly', 'readonly');
  }
  applyApiBaseByPro();

  function setMode(next) {
    mode = next;
    if (mode === '539') {
      $('tab539').classList.add('active'); $('tab649').classList.remove('active');
      dataEl.placeholder = '今彩539 每行 5 個號碼 (1-39)\n例：3,6,9,31,39';
      helpEl.textContent = '今彩539：每行 5 個號碼 (1-39)。你也可以先按「一鍵抓取」。';
      const cached = localStorage.getItem(LS_LAST_539);
      if (cached && !dataEl.value.trim()) dataEl.value = cached;
    } else {
      $('tab649').classList.add('active'); $('tab539').classList.remove('active');
      dataEl.placeholder = '大樂透 每行 6 個號碼 (1-49)\n例：1,16,22,24,47,48';
      helpEl.textContent = '大樂透：每行 6 個號碼 (1-49)。一鍵抓取若無資料請改用手動貼上。';
      const cached = localStorage.getItem(LS_LAST_649);
      if (cached && !dataEl.value.trim()) dataEl.value = cached;
    }
    renderLucky(mode);
  }

  $('tab539').onclick = () => setMode('539');
  $('tab649').onclick = () => setMode('649');
  setMode('539');

  /** 今日幸運號：用日期當 seed，539 為 5 碼(1-39)、大樂透為 6 碼(1-49) */
  function getTodayLuckyNumbers(maxNum, count) {
    if (!count) count = maxNum === 39 ? 5 : 6;
    var d = new Date();
    var seed = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
    var s = seed % 2147483647;
    var out = [];
    while (out.length < count) {
      s = (s * 16807) % 2147483647;
      var n = (s % maxNum) + 1;
      if (out.indexOf(n) === -1) out.push(n);
    }
    return out.sort(function(a, b) { return a - b; });
  }
  function renderLucky(m) {
    var el = document.getElementById('luckyNums');
    var titleEl = document.querySelector('.lucky-card .title');
    if (!el) return;
    var maxNum = m === '649' ? 49 : 39;
    var count = m === '649' ? 6 : 5;
    var nums = getTodayLuckyNumbers(maxNum, count);
    el.innerHTML = nums.map(function(n) { return '<span class="num">' + (n < 10 ? '0' + n : n) + '</span>'; }).join('');
    if (titleEl) titleEl.textContent = m === '649' ? '🍀 今日幸運號（大樂透 6 碼，僅供娛樂）' : '🍀 今日幸運號（今彩539 5 碼，僅供娛樂）';
  }

  // 虛擬土地公：今日籤詩＋安慰語（純前端、僅供娛樂）
  var LANDGOD_FORTUNES = [
    '見好就收，手氣好時也要懂得休息。',
    '貪多必失，小注小玩，長久才是福。',
    '今天適合穩紮穩打，不宜重押單一組合。',
    '心靜自然明，別被上一期的結果影響判斷。',
    '有中沒中都當作買個好心情，切勿借錢下注。',
    '財運有起有落，記得為自己設好停損與預算。',
    '順勢而為，不逆天行；不熟的牌路就當練習。',
    '休息也是一種投資，讓自己遠離情緒化下注。'
  ];
  var LANDGOD_COMFORTS = [
    '沒中的時候就當作買平安，賭的是心情不是命。',
    '輸贏都是常態，重要的是你還守得住自己的底線。',
    '今天先把錢留給更重要的事，彩金以後還有機會。',
    '覺得悶就先停一停，等心情穩了再決定要不要玩。',
    '別和別人的戰績比較，照自己的步調慢慢來。',
    '中了別太飄，沒中別太挫折，生活還有很多重點。',
    '財不可強求，有賺就收手，才留得住福氣。',
    '土地公說：睡飽、吃好，比熬夜對牌還重要。'
  ];

  function getLandgodDailyIndex(max) {
    var d = new Date();
    var seed = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
    var s = seed % 2147483647;
    s = (s * 16807) % 2147483647;
    return s % max;
  }

  function renderLandgodFortune() {
    var box = document.getElementById('landgodFortune');
    if (!box) return;
    if (!Array.isArray(LANDGOD_FORTUNES) || LANDGOD_FORTUNES.length === 0) return;
    var idx = getLandgodDailyIndex(LANDGOD_FORTUNES.length);
    box.textContent = LANDGOD_FORTUNES[idx];
  }

  function bindLandgodComfort() {
    var btn = document.getElementById('btnLandgodComfort');
    if (!btn) return;
    btn.addEventListener('click', function() {
      if (!Array.isArray(LANDGOD_COMFORTS) || LANDGOD_COMFORTS.length === 0) return;
      var idx = Math.floor(Math.random() * LANDGOD_COMFORTS.length);
      alert(LANDGOD_COMFORTS[idx]);
    });
  }

  function refreshVersionUI() {
    var labelFetch = $('labelFetch');
    if (labelFetch) labelFetch.textContent = '一鍵抓取（免費可用，直接按）';
  }
  const urlParams = new URLSearchParams(window.location.search);
  const paid = urlParams.get('paid');
  const until = urlParams.get('until');
  if (paid === '1') {
    localStorage.setItem(LS_IS_PRO, '1');
    localStorage.setItem(LS_API_BASE, DEFAULT_API_BASE);
    if (until && /^\d{8}$/.test(until)) {
      localStorage.setItem(LS_PAID_UNTIL, until);
    } else {
      var d = new Date();
      d.setMonth(d.getMonth() + 1);
      var y = d.getFullYear(), m = d.getMonth() + 1, day = d.getDate();
      var defaultUntil = '' + y + (m < 10 ? '0' : '') + m + (day < 10 ? '0' : '') + day;
      localStorage.setItem(LS_PAID_UNTIL, defaultUntil);
    }
    history.replaceState({}, '', window.location.pathname + (window.location.hash || ''));
  }
  var justExpired = clearPaidIfExpired();
  refreshVersionUI();
  if (justExpired && outEl) {
    outEl.textContent = '感謝您過去的支持，全站已開放免費使用。';
  }

  (function setupUpgradeLink() {
    const link = $('linkUpgrade');
    if (!link) return;
    link.href = PAYMENT_URL || 'pay.html';
  })();

  (function setupResetFreeLink() {
    const link = $('linkResetFree');
    if (!link) return;
    link.onclick = function(e) {
      e.preventDefault();
      localStorage.removeItem(LS_IS_PRO);
      localStorage.removeItem(LS_PAID_UNTIL);
      localStorage.removeItem(LS_API_BASE);
      window.location.reload();
    };
  })();

  function fmtDrawLines(draws) {
    return draws.map(d => d.join(', ')).join('\n');
  }

  function isPro() {
    clearPaidIfExpired();
    return localStorage.getItem(LS_IS_PRO) === '1';
  }

  async function fetchDraws() {
    if (!(apiBaseEl.value || '').trim() && DEFAULT_API_BASE) apiBaseEl.value = DEFAULT_API_BASE;
    var base = (apiBaseEl.value || '').trim().replace(/\/+$/, '');
    if (!base) base = DEFAULT_API_BASE;
    if (!base) {
      outEl.textContent = '請在上方輸入抓取服務網址，或重新整理頁面（會預填網址）。';
      return;
    }
    const n = Math.max(1, Math.min(parseInt(periodsEl.value, 10) || 20, 200));
    outEl.textContent = `正在抓取 ${mode === '539' ? '今彩539' : '大樂透'} 最近 ${n} 期…`;
    const url = base + '/' + mode + '?periods=' + encodeURIComponent(n);
    let resp;
    try {
      resp = await fetch(url, { method: 'GET', mode: 'cors' });
    } catch (e) {
      var errMsg = '抓取失敗：無法連線（可能是 CORS 或網路問題）。\n\n' +
        '若你的是「抓取服務」是自己架的，請在該服務加上回應標頭：\nAccess-Control-Allow-Origin: *\n\n' +
        '或先改用手動貼上開獎號碼。\n\n' + String(e);
      if (mode === '649') errMsg = '抓取失敗（大樂透可能需抓取服務支援 /649）。\n\n請改用手動貼上開獎號碼：每行 6 個號碼 (1-49)，逗號或空格分隔。\n\n' + String(e);
      outEl.textContent = errMsg;
      return;
    }
    if (!resp.ok) {
      const t = await resp.text().catch(function() { return ''; });
      var failText = '抓取失敗：HTTP ' + resp.status + '\n' + (t || '');
      if (mode === '649') failText += '\n\n大樂透若無 /649 端點，請改用手動貼上開獎號碼（每行 6 碼 1-49）。';
      outEl.textContent = failText;
      return;
    }
    let json;
    try {
      json = await resp.json();
    } catch (e) {
      outEl.textContent = '抓取失敗：回傳不是 JSON。\n' + String(e);
      return;
    }
    const draws = Array.isArray(json.draws) ? json.draws : [];
    if (!draws.length) {
      var msg = '抓取成功，但沒有拿到期數資料（draws 為空）。';
      if (mode === '649') msg += '\n\n大樂透若無一鍵抓取服務，請改用手動貼上開獎號碼（每行 6 碼 1-49）。';
      outEl.textContent = msg;
      return;
    }
    dataEl.value = fmtDrawLines(draws);
    if (mode === '539') localStorage.setItem(LS_LAST_539, dataEl.value);
    else localStorage.setItem(LS_LAST_649, dataEl.value);
    outEl.textContent = '✅ 已抓取 ' + draws.length + ' 期並填入。現在可以按「分析」或「AI 快報」。';
  }

  $('btnFetch').onclick = () => { fetchDraws(); };

  function parseData(text, type) {
    const maxNum = type === '539' ? 39 : 49;
    const need = type === '539' ? 5 : 6;
    const lines = text.trim().split(/\n/).filter(Boolean);
    const draws = [];
    for (const line of lines) {
      const nums = line.replace(/,/g, ' ').split(/\s+/).map(s => parseInt(s, 10)).filter(n => !isNaN(n) && n >= 1 && n <= maxNum);
      const uniq = [...new Set(nums)];
      if (uniq.length === need) draws.push(uniq.sort((a,b)=>a-b));
    }
    return draws;
  }

  /** 累計遺漏前 K 名：539 取 5、大樂透取 6 */
  function getTopOmission(draws, maxNum, topK) {
    if (!topK) topK = maxNum === 39 ? 5 : 6;
    const omission = {};
    for (let n = 1; n <= maxNum; n++) omission[n] = draws.length;
    for (let i = 0; i < draws.length; i++) {
      for (const n of draws[i]) {
        if (n >= 1 && n <= maxNum && omission[n] === draws.length) omission[n] = i;
      }
    }
    return Object.entries(omission)
      .sort((a, b) => b[1] - a[1])
      .slice(0, topK)
      .map(([n, periods]) => ({ num: +n, periods }));
  }
  function getTop5Omission(draws, maxNum) { return getTopOmission(draws, maxNum, maxNum === 39 ? 5 : 6); }

  /** 冷熱號一覽表：1~max 出現次數＋遺漏期數，依出現次數排序 */
  function runHotColdTable(draws, n, maxNum) {
    const use = draws.slice(0, n);
    if (use.length < 2) return '請至少貼上 2 期開獎資料。';
    const gameLabel = maxNum === 39 ? '今彩539' : '大樂透';
    const counts = {};
    for (let i = 1; i <= maxNum; i++) counts[i] = 0;

  // ===== 付費版結構分析：從 Python PremiumLotteryAnalyzer 移植 =====

  function zone3(nums) {
    let low = 0, mid = 0, high = 0;
    for (const n of nums) {
      if (n <= 13) low++;
      else if (n <= 26) mid++;
      else high++;
    }
    const arr = [low, mid, high].slice().sort((a, b) => a - b);
    if (arr[0] === 1 && arr[1] === 2 && arr[2] === 2) {
      return [20, '號碼分布蠻平均，整體算是很健康。'];
    } else if ([low, mid, high].some(v => v === 3)) {
      return [15, '號碼有一點擠在同一區，不過還在可以接受的範圍。'];
    }
    return [8, '號碼比較集中在某一區，可以考慮換幾個位置試試看。'];
  }

  function zone4(nums) {
    let z1 = 0, z2 = 0, z3 = 0, z4 = 0;
    for (const n of nums) {
      if (n <= 12) z1++;
      else if (n <= 24) z2++;
      else if (n <= 36) z3++;
      else z4++;
    }
    const zones = [z1, z2, z3, z4];
    if (zones.every(z => z <= 2)) {
      return [20, '號碼在四個區間分得還不錯，看起來蠻平均。'];
    } else if (zones.some(z => z >= 3)) {
      return [12, '有一兩個區間的號碼比較多，整體還算可以。'];
    }
    return [8, '號碼有點擠在某幾個區，可以下次換幾顆到別區看看。'];
  }

  function oddEvenScore(nums, total) {
    const odd = nums.filter(n => n % 2 === 1).length;
    if (total === 5) {
      if (odd === 2 || odd === 3) return [20, '單雙數量搭配得不錯，算是中規中矩。'];
      if (odd === 1 || odd === 4) return [10, '單雙有一點偏，但整體還可以。'];
      return [5, '單雙有點太偏，可以考慮下次多換一兩顆。'];
    } else if (total === 6) {
      if (odd === 3) return [20, '單雙各半，屬於比較常見、比較穩的組合。'];
      if (odd === 2 || odd === 4) return [12, '單雙稍微偏一點，不過還算可以接受。'];
      return [5, '單雙比例偏比較多，下次可以試著調整看看。'];
    }
    return [0, ''];
  }

  function sumScore(nums, idealLow, idealHigh, extremeLow, extremeHigh) {
    const total = nums.reduce((a, b) => a + b, 0);
    if (total >= idealLow && total <= idealHigh) {
      return [20, `號碼加起來的總和在常見範圍內，整體走勢算穩。（${total}）`];
    } else if (total >= extremeLow && total <= extremeHigh) {
      return [12, `總和稍微高一點或低一點，還在勉強可以接受的區間。（${total}）`];
    }
    return [5, `總和比較偏一邊，是屬於比較極端的排列，下次可以試著調整。 （${total}）`];
  }

  function consecutiveScore(nums) {
    let count = 0;
    for (let i = 0; i < nums.length - 1; i++) {
      if (nums[i + 1] === nums[i] + 1) count++;
    }
    if (count <= 1) return [15, '連在一起的號碼不多，整體看起來還算順。'];
    if (count === 2) return [8, '有幾顆連在一起，算是中間偏多一點點。'];
    return [5, '連在一起的號碼比較多，下次可以考慮拆開一兩組。'];
  }

  function collisionPercentile(nums) {
    const birthdayCount = nums.filter(n => n <= 31).length;
    const percentile = Math.max(10, 100 - birthdayCount * 15);
    return `撞號風險低於 ${percentile}% 玩家`;
  }

  function generateOptimizedNumbers(gameType) {
    const max = gameType === '539' ? 39 : 49;
    const need = gameType === '539' ? 5 : 6;
    const set = new Set();
    while (set.size < need) {
      const n = Math.floor(Math.random() * max) + 1;
      set.add(n);
    }
    return Array.from(set).sort((a, b) => a - b);
  }

  function packageSimulation(gameType) {
    const totalCombinations = gameType === '539' ? 575757 : 13983816;
    return {
      buy_1_ticket_chance: `1 / ${totalCombinations}`,
      buy_10_ticket_chance: `約 10 / ${totalCombinations}`,
      note: '包牌可提高機率，但成本等比例增加'
    };
  }

  function buildBasicResult(nums, totalScore, zoneMsg, oddMsg, sumMsg, conMsg) {
    let summary;
    if (totalScore >= 70) summary = '整體結構算是不錯，可以當作參考方向。';
    else if (totalScore >= 50) summary = '結構普通，還可以再微調一點會更理想。';
    else summary = '這組號碼的結構比較辛苦，建議下次調整一下搭配。';
    return {
      numbers: nums,
      total_score: totalScore,
      summary,
      analysis: {
        zone: zoneMsg,
        odd_even: oddMsg,
        sum: sumMsg,
        consecutive: conMsg
      }
    };
  }

  function premiumAnalyzeOne(nums, gameType, isPremium) {
    const numbers = [...nums].sort((a, b) => a - b);
    if (gameType !== '539' && gameType !== 'lotto') {
      throw new Error("game_type must be '539' or 'lotto'");
    }
    let zoneScore, zoneMsg, oddScore, oddMsg, sumScoreVal, sumMsg, conScore, conMsg;
    if (gameType === '539') {
      [zoneScore, zoneMsg] = zone3(numbers);
      [oddScore, oddMsg] = oddEvenScore(numbers, 5);
      [sumScoreVal, sumMsg] = sumScore(numbers, 80, 120, 60, 140);
      [conScore, conMsg] = consecutiveScore(numbers);
    } else {
      [zoneScore, zoneMsg] = zone4(numbers);
      [oddScore, oddMsg] = oddEvenScore(numbers, 6);
      [sumScoreVal, sumMsg] = sumScore(numbers, 130, 170, 100, 200);
      [conScore, conMsg] = consecutiveScore(numbers);
    }
    const totalScore = zoneScore + oddScore + sumScoreVal + conScore;
    const result = buildBasicResult(numbers, totalScore, zoneMsg, oddMsg, sumMsg, conMsg);
    if (isPremium) {
      const gt = gameType === '539' ? '539' : 'lotto';
      result.premium = {
        collision_percentile: collisionPercentile(numbers),
        optimized_suggestion: generateOptimizedNumbers(gt),
        package_simulation: packageSimulation(gt)
      };
    }
    return result;
  }

    if (!draws.length) return '請先貼上開獎號碼，每行一組。';

    text += `總和高低感覺：${base.sum || ''}\n`;
    text += `連號多寡感覺：${base.consecutive || ''}\n`;
    if (r.premium) {
      const p = r.premium;

      text += `\n【進階提醒，給想多看一點的朋友】\n`;

      text += `如果考慮多買幾注：單注機會約 ${pkg.buy_1_ticket_chance || ''}，十注大約是 ${pkg.buy_10_ticket_chance || ''}\n`;
      if (pkg.note) text += `小提醒：${pkg.note}\n`;
    }
    text += '\n※以上只是幫忙看結構、做參考用就好，還是要量力而為，不要影響生活。';

    const draws = parseData(dataEl.value, mode);
    if (!draws.length) { outEl.textContent = '請先貼上開獎號碼，每行一期。'; return; }
    outEl.textContent = proStructureText(draws, mode);
  };

  $('btnHotCold').onclick = () => {
    const draws = parseData(dataEl.value, mode);
    if (!draws.length) { outEl.textContent = '請先貼上開獎號碼，每行一期。'; return; }
    const maxNum = mode === '539' ? 39 : 49;
    const n = Math.min(parseInt(periodsEl.value, 10) || 50, draws.length);
    outEl.innerHTML = runHotColdTable(draws, n, maxNum);
  };

  $('btnTrend').onclick = () => {
    const draws = parseData(dataEl.value, mode);
    if (!draws.length) { outEl.textContent = '請先貼上開獎號碼，每行一期。'; return; }
    const maxNum = mode === '539' ? 39 : 49;
    const n = Math.min(parseInt(periodsEl.value, 10) || 50, draws.length);
    outEl.innerHTML = runTrendChart(draws, n, maxNum);
  };
})();
  </script>
</body>
